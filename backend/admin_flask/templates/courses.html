{% extends 'base.html' %}

{% block title %}Courses{% endblock %}

{% block content %}
<section>
  <h1>Course Logs</h1>
  <table>
    <thead>
      <tr>
        <th>User Email</th>
        <th>Course</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody>
      {% for course in courses %}
      <tr>
        <td>{{ course.user_email or '-' }}</td>
        <td>{{ course.title }}</td>
        <td class="details-cell">{{ course.details }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
