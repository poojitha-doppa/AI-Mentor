{% extends 'base.html' %}

{% block title %}Users{% endblock %}

{% block content %}
<section>
  <h1>Users</h1>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
      </tr>
    </thead>
    <tbody>
      {% for user in users %}
      <tr>
        <td>{{ user.get('name', '-') }}</td>
        <td>{{ user.get('email', '-') }}</td>
        <td>{{ user.get('role', 'user') }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
