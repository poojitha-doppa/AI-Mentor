# Career Sync - Production Deployment Configuration
# This configuration sets up a reverse proxy to serve all modules under a single domain

# Install nginx or use this configuration with any reverse proxy

upstream landing_page {
    server 127.0.0.1:4173;
}

upstream course_generator {
    server 127.0.0.1:3002;
}

upstream roadmap {
    server 127.0.0.1:5173;
}

upstream evaluator {
    server 127.0.0.1:3001;
}

upstream api_backend {
    server 127.0.0.1:5000;
}

server {
    listen 80;
    server_name localhost careersync.local;

    # Landing page - serve at root
    location / {
        proxy_pass http://landing_page;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Auth page
    location /auth {
        rewrite ^/auth$ /auth.html break;
        proxy_pass http://landing_page;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Course Generator
    location /course-generator {
        rewrite ^/course-generator/?(.*)$ /$1 break;
        proxy_pass http://course_generator;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Roadmap
    location /roadmap {
        rewrite ^/roadmap/?(.*)$ /$1 break;
        proxy_pass http://roadmap;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Evaluator/Test Generation
    location /evaluator {
        rewrite ^/evaluator/?(.*)$ /$1 break;
        proxy_pass http://evaluator;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API Backend
    location /api {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
