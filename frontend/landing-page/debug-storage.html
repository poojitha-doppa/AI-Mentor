<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - localStorage User Structure</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }
        .section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border-left: 4px solid #4F46E5;
        }
        h2 {
            color: #4F46E5;
            margin-top: 0;
        }
        pre {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
        }
        .error {
            color: #ef4444;
            font-weight: bold;
        }
        .success {
            color: #10b981;
            font-weight: bold;
        }
        .warning {
            color: #f59e0b;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        td:first-child {
            font-weight: bold;
            width: 30%;
        }
    </style>
</head>
<body>
    <h1>🔍 localStorage Debug</h1>

    <div class="section">
        <h2>careersync_user Object</h2>
        <div id="careersync-user"></div>
    </div>

    <div class="section">
        <h2>careeros_user Object</h2>
        <div id="careeros-user"></div>
    </div>

    <div class="section">
        <h2>All Storage Keys</h2>
        <table id="all-keys"></table>
    </div>

    <div class="section">
        <h2>Comparison: What Backend Expects</h2>
        <table>
            <tr>
                <td>userId</td>
                <td id="user-id"></td>
            </tr>
            <tr>
                <td>userEmail</td>
                <td id="user-email"></td>
            </tr>
            <tr>
                <td>Status</td>
                <td id="status"></td>
            </tr>
        </table>
    </div>

    <script>
        function displayObj(obj, elementId) {
            const el = document.getElementById(elementId);
            if (!obj || Object.keys(obj).length === 0) {
                el.innerHTML = '<span class="error">❌ Not found or empty</span>';
                return;
            }
            
            let html = '<table>';
            Object.entries(obj).forEach(([key, value]) => {
                let displayValue = value;
                if (typeof value === 'object') {
                    displayValue = JSON.stringify(value).substring(0, 50) + '...';
                } else if (typeof value === 'string' && value.length > 50) {
                    displayValue = value.substring(0, 50) + '...';
                }
                html += `<tr><td>${key}</td><td>${displayValue}</td></tr>`;
            });
            html += '</table>';
            el.innerHTML = html;
        }

        // Check careersync_user
        const careersyncStr = localStorage.getItem('careersync_user');
        const careersyncUser = careersyncStr ? JSON.parse(careersyncStr) : null;
        displayObj(careersyncUser, 'careersync-user');

        // Check careeros_user
        const careerOsStr = localStorage.getItem('careeros_user');
        const careerOsUser = careerOsStr ? JSON.parse(careerOsStr) : null;
        displayObj(careerOsUser, 'careeros-user');

        // All keys
        const table = document.getElementById('all-keys');
        let html = '<tr style="font-weight:bold;border-bottom:2px solid #333;"><td>Key</td><td>Value (truncated)</td></tr>';
        Object.keys(localStorage).forEach(key => {
            const value = localStorage.getItem(key);
            const truncated = value.length > 50 ? value.substring(0, 50) + '...' : value;
            html += `<tr><td>${key}</td><td>${truncated}</td></tr>`;
        });
        table.innerHTML = html;

        // What backend expects
        const user = careersyncUser || careerOsUser || {};
        const userId = user.id || user._id || user.user_id || '❌ NOT FOUND';
        const userEmail = user.email || user.userEmail || '❌ NOT FOUND';
        
        document.getElementById('user-id').innerHTML = userId;
        document.getElementById('user-email').innerHTML = userEmail;
        
        const isValid = userId !== '❌ NOT FOUND' && userEmail !== '❌ NOT FOUND';
        const statusEl = document.getElementById('status');
        if (isValid) {
            statusEl.innerHTML = '<span class="success">✅ Ready - User can save courses</span>';
        } else {
            statusEl.innerHTML = '<span class="error">❌ Missing - Courses will save as "guest"</span>';
        }
    </script>
</body>
</html>
