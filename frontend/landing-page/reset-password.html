<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - careersync</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%234F46E5'/%3E%3Ccircle cx='16' cy='16' r='6' fill='white'/%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(79, 70, 229, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0F172A;
            text-align: center;
            margin-bottom: 12px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4F46E5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .password-requirements {
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
        }

        .password-requirements h4 {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .requirement.met {
            color: #16a34a;
        }

        .requirement.met::before {
            content: '✓';
            color: #16a34a;
            font-weight: bold;
        }

        .requirement:not(.met)::before {
            content: '○';
            color: #cbd5e1;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(79, 70, 229, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #dc2626;
        }

        .success {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #16a34a;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #4F46E5;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #4F46E5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">C</div>
            <h1>Reset Password</h1>
            <p class="subtitle">Create a new password for your account</p>
        </div>

        <div id="message"></div>

        <form id="reset-form">
            <div class="form-group">
                <label for="new-password">New Password</label>
                <input 
                    type="password" 
                    id="new-password" 
                    name="new-password" 
                    placeholder="Enter new password"
                    required 
                    autocomplete="new-password"
                >
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirm-password" 
                    name="confirm-password" 
                    placeholder="Confirm new password"
                    required 
                    autocomplete="new-password"
                >
                
                <div class="password-requirements">
                    <h4>Password Requirements:</h4>
                    <div class="requirement" id="req-length">At least 8 characters</div>
                    <div class="requirement" id="req-uppercase">One uppercase letter</div>
                    <div class="requirement" id="req-lowercase">One lowercase letter</div>
                    <div class="requirement" id="req-number">One number</div>
                    <div class="requirement" id="req-match">Passwords match</div>
                </div>
            </div>

            <button type="submit" class="btn" id="reset-btn">
                Reset Password
            </button>
        </form>

        <div class="back-link">
            <a href="/auth">← Back to Sign In</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let email = '';
        let otp = '';

        // Get email and OTP from URL
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            email = urlParams.get('email') || localStorage.getItem('reset_email') || '';
            otp = urlParams.get('otp') || localStorage.getItem('reset_otp') || '';
            
            if (!email || !otp) {
                showError('Invalid reset link. Please request a new password reset.');
                document.getElementById('reset-btn').disabled = true;
                setTimeout(() => {
                    window.location.href = '/auth';
                }, 3000);
            }
        }

        function showError(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="error">${message}</div>`;
        }

        function showSuccess(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="success">${message}</div>`;
        }

        function setLoading(button, isLoading) {
            if (isLoading) {
                button.disabled = true;
                button.dataset.originalText = button.textContent;
                button.innerHTML = button.dataset.originalText + '<span class="loading"></span>';
            } else {
                button.disabled = false;
                button.textContent = button.dataset.originalText;
            }
        }

        function validatePassword() {
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            
            const requirements = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                match: password === confirm && password.length > 0
            };

            document.getElementById('req-length').classList.toggle('met', requirements.length);
            document.getElementById('req-uppercase').classList.toggle('met', requirements.uppercase);
            document.getElementById('req-lowercase').classList.toggle('met', requirements.lowercase);
            document.getElementById('req-number').classList.toggle('met', requirements.number);
            document.getElementById('req-match').classList.toggle('met', requirements.match);

            return Object.values(requirements).every(r => r);
        }

        // Real-time validation
        document.getElementById('new-password').addEventListener('input', validatePassword);
        document.getElementById('confirm-password').addEventListener('input', validatePassword);

        // Reset password
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validatePassword()) {
                showError('Please meet all password requirements');
                return;
            }

            const password = document.getElementById('new-password').value;
            const submitBtn = document.getElementById('reset-btn');

            setLoading(submitBtn, true);

            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, newPassword: password })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('✅ Password reset successful! Logging you in...');
                    localStorage.removeItem('reset_email');
                    localStorage.removeItem('reset_otp');
                    
                    // Auto-login after password reset
                    if (data.token && data.user) {
                        localStorage.setItem('careersync_user', JSON.stringify({
                            email: data.user.email,
                            id: data.user.id,
                            name: data.user.name || data.user.email.split('@')[0]
                        }));
                        localStorage.setItem('careersync_token', data.token);
                        
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1500);
                    } else {
                        setTimeout(() => {
                            window.location.href = '/auth';
                        }, 2000);
                    }
                } else {
                    showError(data.error || 'Failed to reset password. Please try again.');
                    setLoading(submitBtn, false);
                }
            } catch (error) {
                console.error('Reset error:', error);
                showError('Failed to reset password. Please try again.');
                setLoading(submitBtn, false);
            }
        });

        // Initialize
        init();
    </script>
</body>
</html>
