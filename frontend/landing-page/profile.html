    <script>
        // Global module URL helper - detects environment and provides correct URLs
        window.getModuleUrls = function() {
            const isProduction = window.location.hostname.includes('onrender.com');
            if (isProduction) {
                return {
                    landing: 'https://careersync-landing-oldo.onrender.com',
                    course: 'https://careersync-course-gen-oldo.onrender.com',
                    roadmap: 'https://careersync-roadmap-oldo.onrender.com',
                    skillEval: 'https://career-sync-skill-evalutor.onrender.com',
                    backend: 'https://careersync-backend-oldo.onrender.com'
                };
            }
            return {
                landing: 'http://localhost:4173',
                course: 'http://localhost:3002',
                roadmap: 'http://localhost:5173',
                skillEval: 'http://localhost:3001',
                backend: 'http://localhost:5000'
            };
        };
        
        // Restore auth from URL if coming from another module
        (function() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('auth_token');
            const userStr = params.get('auth_user');
            
            if (token && userStr) {
                console.log('✅ Restoring auth from URL parameters');
                localStorage.setItem('careersync_token', token);
                localStorage.setItem('careersync_user', userStr);
                // Clean URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        })();
    </script>

    <script>
        // Initialize global course data storage at the very beginning
        if (!window.courseData) {
            window.courseData = {};
        }
        
        console.log('Profile page loaded');

        // Helper function to get cookie value
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        // ==================== COURSE NAVIGATION ====================
        
        /**
         * Navigate to course viewer
         */
        function navigateToCourseViewer(courseId) {
            console.log('🚀 Navigating to course viewer for:', courseId);
            window.location.href = `course-viewer.html?courseId=${courseId}`;
        }

        /**
         * Open course (alias for navigateToCourseViewer)
         */
        function openCourse(courseId) {
            navigateToCourseViewer(courseId);
        }

        // ==================== MODULE MODAL ====================
        
        /**
         * Close modules modal
         */
        function closeModulesModal() {
            const modal = document.getElementById('modules-modal');
            modal.style.display = 'none';
        }

        /**
         * Close modal when clicking outside
         */
        document.addEventListener('click', function(event) {
            const modal = document.getElementById('modules-modal');
            if (event.target === modal) {
                closeModulesModal();
            }
        });

        async function loadProfile() {
            try {
                console.log('📋 Loading profile from live API...');
                const loadingEl = document.getElementById('loading');
                const profileContent = document.getElementById('profile-content');
                
                if (loadingEl) loadingEl.style.display = 'flex';
                if (profileContent) profileContent.style.display = 'none';
                
                const token = localStorage.getItem('careersync_token');
                const backendUrl = window.getModuleUrls().backend;
                const headers = { 'Content-Type': 'application/json' };
                if (token) headers.Authorization = `Bearer ${token}`;

                // Fetch user profile from backend
                const userResponse = await fetch(backendUrl + '/api/auth/me', {
                    credentials: 'include',
                    headers: headers
                });

                if (!userResponse.ok) {
                    throw new Error(`Failed to fetch user: ${userResponse.status}`);
                }

                const userData = await userResponse.json();
                const user = userData.user || userData;
                console.log('✅ User data:', user);

                // Fetch all user data in parallel
                const userId = user._id || user.id;
                const email = user.email;

                const [coursesResp, roadmapsResp, evalsResp] = await Promise.all([
                    fetch(backendUrl + `/api/courses/user/${userId}`, { 
                        credentials: 'include',
                        headers: headers
                    }),
                    fetch(backendUrl + `/api/roadmaps/user/${userId}`, { 
                        credentials: 'include',
                        headers: headers
                    }),
                    fetch(backendUrl + `/api/evaluations/user/${userId}`, { 
                        credentials: 'include',
                        headers: headers
                    })
                ]);

                const courses = coursesResp.ok ? await coursesResp.json() : [];
                const roadmaps = roadmapsResp.ok ? await roadmapsResp.json() : [];
                const evaluations = evalsResp.ok ? await evalsResp.json() : [];

                console.log('✅ All profile data loaded from API');
                
                displayProfile(user, courses, roadmaps, evaluations);
                
                if (loadingEl) loadingEl.style.display = 'none';
                if (profileContent) profileContent.style.display = 'block';
                
            } catch (error) {
                console.error('❌ Error loading profile:', error);
                const loadingEl = document.getElementById('loading');
                const profileContent = document.getElementById('profile-content');
                if (loadingEl) loadingEl.style.display = 'none';
                if (profileContent) profileContent.style.display = 'block';
            }
        }

        function displayProfile(user, courses, roadmaps, evaluations) {
            console.log('📱 Displaying profile with live API data');
            const initials = (user.name || user.full_name || user.email || 'U').charAt(0).toUpperCase();
            
            // Update user info
            if (document.getElementById('profile-avatar-large')) {
                document.getElementById('profile-avatar-large').textContent = initials;
            }
            if (document.getElementById('profile-full-name')) {
                document.getElementById('profile-full-name').textContent = user.name || user.full_name || 'User';
            }
            if (document.getElementById('profile-full-email')) {
                document.getElementById('profile-full-email').textContent = user.email || 'user@careersync.com';
            }
            
            // Ensure arrays
            const courseArray = Array.isArray(courses) ? courses : (courses.courses || courses.data || []);
            const roadmapArray = Array.isArray(roadmaps) ? roadmaps : (roadmaps.roadmaps || roadmaps.data || []);
            const evalArray = Array.isArray(evaluations) ? evaluations : (evaluations.evaluations || evaluations.data || []);
            
            // Update stats
            if (document.getElementById('stat-courses')) {
                document.getElementById('stat-courses').textContent = courseArray.length;
            }
            if (document.getElementById('stat-roadmaps')) {
                document.getElementById('stat-roadmaps').textContent = roadmapArray.length;
            }
            if (document.getElementById('stat-evaluations')) {
                document.getElementById('stat-evaluations').textContent = evalArray.length;
            }
            
            // Display courses
            const courseContainer = document.getElementById('courses-container');
            if (courseContainer) {
                if (courseArray && courseArray.length > 0) {
                    courseContainer.innerHTML = courseArray.map(course => `
                        <div class="item-card">
                            <div class="item-header">
                                <div>
                                    <p class="item-title">${course.title || 'Course'}</p>
                                </div>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${course.progress || 0}%"></div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    courseContainer.innerHTML = '<div class="empty-state"><div class="empty-icon">📚</div><div class="empty-text">No courses yet</div></div>';
                }
            }
            
            // Display roadmaps
            const roadmapContainer = document.getElementById('roadmaps-container');
            if (roadmapContainer) {
                if (roadmapArray && roadmapArray.length > 0) {
                    roadmapContainer.innerHTML = roadmapArray.map(roadmap => `
                        <div class="item-card">
                            <div class="item-header">
                                <div>
                                    <p class="item-title">${roadmap.title || 'Roadmap'}</p>
                                </div>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${roadmap.progress || 0}%"></div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    roadmapContainer.innerHTML = '<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-text">No roadmaps yet</div></div>';
                }
            }
            
            // Display evaluations
            const evalContainer = document.getElementById('evaluations-container');
            if (evalContainer) {
                if (evalArray && evalArray.length > 0) {
                    evalContainer.innerHTML = evalArray.map(eval => `
                        <div class="item-card">
                            <div class="item-header">
                                <div>
                                    <p class="item-title">${eval.title || eval.skillName || 'Evaluation'}</p>
                                </div>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${eval.score || 0}%"></div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    evalContainer.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No evaluations yet</div></div>';
                }
            }
            
            console.log('✅ Profile display complete');
        }

        // Refresh profile when page becomes visible (returns from course-viewer)
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                console.log('📱 Page returned to focus, refreshing profile...');
                loadProfile();
            }
        });

        // Also refresh when navigating back to the page
        window.addEventListener('pageshow', (event) => {
            // Fires when navigating back via browser back button
            if (event.persisted) {
                console.log('📱 Page loaded from cache, refreshing profile...');
                loadProfile();
            }
        });

        // Refresh when window gains focus
        window.addEventListener('focus', () => {
            console.log('📱 Window focused, refreshing profile...');
            loadProfile();
        });

        // Logout handler
        window.addEventListener('DOMContentLoaded', () => {
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('careersync_user');
                    localStorage.removeItem('careersync_token');
                    window.location.href = window.getModuleUrls().landing + '/auth.html';
                });
            }
            loadProfile();
        });
    </script>
    
    <!-- Footer will be injected automatically by footer-component.js -->
</body>

</html>
