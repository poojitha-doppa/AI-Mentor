<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - careersync</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%234F46E5'/%3E%3Ccircle cx='16' cy='16' r='6' fill='white'/%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(79, 70, 229, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0F172A;
            text-align: center;
            margin-bottom: 12px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .email-display {
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 24px;
            font-weight: 600;
            color: #4F46E5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 600;
            font-size: 20px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #4F46E5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(79, 70, 229, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #dc2626;
        }

        .success {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #16a34a;
        }

        .resend-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #64748b;
        }

        .resend-link button {
            background: none;
            border: none;
            color: #4F46E5;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
            font-family: 'Inter', sans-serif;
        }

        .resend-link button:hover {
            color: #7C3AED;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #4F46E5;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .timer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #64748b;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #4F46E5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">C</div>
            <h1>Verify Your Email</h1>
            <p class="subtitle">We've sent a verification code to your email address. Please enter it below.</p>
        </div>

        <div id="email-display" class="email-display"></div>

        <div id="message"></div>

        <form id="verify-form">
            <div class="form-group">
                <label for="otp">6-Digit Code</label>
                <input 
                    type="text" 
                    id="otp" 
                    name="otp" 
                    placeholder="000000" 
                    maxlength="6" 
                    pattern="[0-9]{6}"
                    required 
                    autocomplete="off"
                    autofocus
                >
            </div>

            <button type="submit" class="btn" id="verify-btn">
                Verify Code
            </button>
        </form>

        <div class="timer" id="timer"></div>

        <div class="resend-link">
            Didn't receive the code? 
            <button id="resend-btn">Resend Code</button>
        </div>

        <div class="back-link">
            <a href="/auth">← Back to Sign In</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let email = '';
        let expiryTime = null;
        let timerInterval = null;
        let isPasswordReset = false;

        // Get email from URL or localStorage
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            email = urlParams.get('email') || localStorage.getItem('otp_verify_email') || '';
            isPasswordReset = urlParams.get('reset') === 'true';
            
            if (!email) {
                showError('No email provided. Redirecting to sign in...');
                setTimeout(() => {
                    window.location.href = '/auth';
                }, 2000);
                return;
            }

            document.getElementById('email-display').textContent = email;
            localStorage.setItem('otp_verify_email', email);
            
            // Update subtitle if this is a password reset
            if (isPasswordReset) {
                document.querySelector('.subtitle').textContent = 'Enter the verification code to reset your password.';
            }
            
            // Set expiry time (10 minutes from now)
            expiryTime = Date.now() + (10 * 60 * 1000);
            startTimer();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                const remaining = expiryTime - Date.now();
                
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').innerHTML = '⏱️ Code expired. Please request a new one.';
                    document.getElementById('verify-btn').disabled = true;
                    return;
                }

                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                document.getElementById('timer').innerHTML = `⏱️ Code expires in ${minutes}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function showError(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="error">${message}</div>`;
        }

        function showSuccess(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="success">${message}</div>`;
        }

        function setLoading(button, isLoading) {
            if (isLoading) {
                button.disabled = true;
                button.dataset.originalText = button.textContent;
                button.innerHTML = button.dataset.originalText + '<span class="loading"></span>';
            } else {
                button.disabled = false;
                button.textContent = button.dataset.originalText;
            }
        }

        // Verify OTP
        document.getElementById('verify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const otp = document.getElementById('otp').value.trim();
            const submitBtn = document.getElementById('verify-btn');

            if (otp.length !== 6 || !/^\d{6}$/.test(otp)) {
                showError('Please enter a valid 6-digit code');
                return;
            }

            setLoading(submitBtn, true);

            try {
                // If this is a password reset flow, redirect to reset-password page
                if (isPasswordReset) {
                    // Store the OTP temporarily for password reset
                    localStorage.setItem('reset_email', email);
                    localStorage.setItem('reset_otp', otp);
                    showSuccess('✅ Code verified! Redirecting to password reset...');
                    setTimeout(() => {
                        window.location.href = `/reset-password.html?email=${encodeURIComponent(email)}&otp=${otp}`;
                    }, 1500);
                    return;
                }

                // Otherwise, continue with login-otp flow
                const response = await fetch(`${API_BASE}/auth/login-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('✅ Verification successful! Redirecting...');
                    
                    // Store user data
                    localStorage.setItem('careersync_user', JSON.stringify({
                        email: data.user.email,
                        id: data.user.id,
                        name: data.user.name
                    }));
                    localStorage.setItem('careersync_token', data.token);
                    localStorage.removeItem('otp_verify_email');
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showError(data.error || 'Invalid or expired code. Please try again.');
                    setLoading(submitBtn, false);
                }
            } catch (error) {
                console.error('Verification error:', error);
                showError('Failed to verify code. Please try again.');
                setLoading(submitBtn, false);
            }
        });

        // Resend OTP
        document.getElementById('resend-btn').addEventListener('click', async () => {
            const resendBtn = document.getElementById('resend-btn');
            setLoading(resendBtn, true);

            try {
                const response = await fetch(`${API_BASE}/auth/request-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('✅ New code sent! Please check your email.');
                    expiryTime = Date.now() + (10 * 60 * 1000);
                    startTimer();
                    document.getElementById('verify-btn').disabled = false;
                    document.getElementById('otp').value = '';
                    document.getElementById('otp').focus();
                } else {
                    showError(data.error || 'Failed to resend code. Please try again.');
                }
            } catch (error) {
                console.error('Resend error:', error);
                showError('Failed to resend code. Please try again.');
            } finally {
                setLoading(resendBtn, false);
            }
        });

        // Auto-submit when 6 digits are entered
        document.getElementById('otp').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
            
            if (e.target.value.length === 6) {
                document.getElementById('verify-form').dispatchEvent(new Event('submit'));
            }
        });

        // Initialize
        init();
    </script>
</body>
</html>
